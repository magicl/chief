name: olib-dev-test-all
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test-all:
    runs-on: ol-base-chief
    steps:
      - name: Install Git LFS
        env:
          GIT_LFS_VERSION: 3.7.1
        run: |
          if command -v git-lfs >/dev/null 2>&1; then
            exit 0
          fi
          case "$(uname -m)" in
            x86_64)
              archive_arch=amd64
              archive_sha256=1c0b6ee5200ca708c5cebebb18fdeb0e1c98f1af5c1a9cba205a4c0ab5a5ec08
              ;;
            aarch64|arm64)
              archive_arch=arm64
              archive_sha256=73a9c90eeb4312133a63c3eaee0c38c019ea7bfa0953d174809d25b18588dd8d
              ;;
            *)
              echo "::error::Unsupported runner architecture: $(uname -m)"
              exit 1
              ;;
          esac
          archive="$RUNNER_TEMP/git-lfs.tar.gz"
          bin_dir="$RUNNER_TEMP/git-lfs-bin"
          curl --fail --location --silent --show-error \
            "https://github.com/git-lfs/git-lfs/releases/download/v${GIT_LFS_VERSION}/git-lfs-linux-${archive_arch}-v${GIT_LFS_VERSION}.tar.gz" \
            --output "$archive"
          echo "${archive_sha256}  ${archive}" | sha256sum --check
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP"
          mkdir -p "$bin_dir"
          install -m 0755 "$RUNNER_TEMP/git-lfs-${GIT_LFS_VERSION}/git-lfs" "$bin_dir/git-lfs"
          echo "$bin_dir" >> "$GITHUB_PATH"
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true
          # Drop GITHUB_TOKEN from git http headers so the olib PAT can authenticate the submodule.
          persist-credentials: false
      - name: Checkout olib submodule
        env:
          OLIB_CHECKOUT_TOKEN: ${{ secrets.OLIB_CHECKOUT_TOKEN }}
        run: |
          if [ -z "$OLIB_CHECKOUT_TOKEN" ]; then
            echo '::error::OLIB_CHECKOUT_TOKEN secret is empty. Add an org/repo Actions secret with Contents:Read on magicl/olib.'
            exit 1
          fi
          # Parent checkout uses GITHUB_TOKEN; this PAT only needs Contents:Read on magicl/olib.
          # Rewrite .gitmodules first — `submodule sync` copies that URL into .git/config and would
          # otherwise restore the SSH remote from .gitmodules and fail host-key checks.
          # Only init `olib` — consumers may have other SSH submodules that fail host-key checks
          # on runners (public HTTPS would work; SSH still needs known_hosts even for public repos).
          git config -f .gitmodules submodule.olib.url "https://x-access-token:${OLIB_CHECKOUT_TOKEN}@github.com/magicl/olib.git"
          git submodule sync olib
          git submodule update --init --depth=1 olib
      - name: Init
        run: |
          ./olib/scripts/init.sh --py --js --rust --cpp --go
      - name: Dev test-all
        run: ./olib/scripts/orunr dev test-all --parallel 4 --full-log-on-failure
