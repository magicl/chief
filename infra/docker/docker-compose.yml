networks:
  default:
    name: ${DOCO_NETWORK:-chief-network}
services:
  # Primary PostgreSQL database.
  chief-postgres:
    image: postgres:17
    ports:
      - "${DOCO_PORT_POSTGRES:-5432}:5432"
    environment:
      POSTGRES_DB: chief
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: nimda
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d chief"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
  # Redis: celery broker + result backend + cache.
  chief-redis:
    image: redis:alpine
    ports:
      - "${DOCO_PORT_REDIS:-6379}:6379"
  # Reverse proxy: routes /static to static nginx, everything else to backend.
  chief-nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Empty conf.d so the image's default.conf is not loaded (our nginx.conf does not include conf.d)
      - ./nginx-conf.d:/etc/nginx/conf.d:ro
    ports:
      - "${DOCO_PORT:-80}:80"
    depends_on:
      - chief-backend
      - chief-static
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/health/livez || exit 1"]
      interval: 100h
      timeout: 2s
      retries: 10
      start_period: 15s
  # Nginx service that serves collected static files from backend/.output/static.
  chief-static:
    image: nginx:alpine
    volumes:
      - ../k8s/nginx.static.conf:/etc/nginx/nginx.conf:ro
      - ../../backend/.output/static:/etc/storage/public/static
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/readyz || exit 1"]
      interval: 100h
      timeout: 2s
      retries: 10
      start_period: 5s
  # Django backend (uvicorn with auto-reload; static served by chief-static via chief-nginx).
  chief-backend:
    image: chief-backend-dev:latest
    build:
      context: ../..
      dockerfile: backend/Dockerfile.dev
    develop:
      watch:
        - path: ../../pyproject.toml
          action: rebuild
        - path: ../../uv.lock
          action: rebuild
        - path: ../../backend/pyproject.toml
          action: rebuild
        - path: ../../backend/Dockerfile.dev
          action: rebuild
    ports:
      - "${DOCO_PORT_BACKEND:-8000}:8000"
    env_file:
      - ../../.output/env.compose.backend
      - path: ../../.env.local
        required: false
    volumes:
      - ../../backend:/app
      - ../../olib:/app/olib
    depends_on:
      chief-postgres:
        condition: service_healthy
      chief-redis:
        condition: service_started
    tty: true
    stdin_open: true
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/livez || exit 1"]
      interval: 100h # Effectively off for dev; runs once during startup
      timeout: 2s
      retries: 10
      start_period: 10s
  # Celery worker: executes agent runs.
  chief-worker:
    image: chief-backend-dev:latest
    build:
      context: ../..
      dockerfile: backend/Dockerfile.dev
    develop:
      watch:
        - path: ../../pyproject.toml
          action: rebuild
        - path: ../../uv.lock
          action: rebuild
        - path: ../../backend/pyproject.toml
          action: rebuild
        - path: ../../backend/Dockerfile.dev
          action: rebuild
    environment:
      - ENTRYPOINT=celery-worker
    env_file:
      - ../../.output/env.compose.backend
      - path: ../../.env.local
        required: false
    volumes:
      - ../../backend:/app
      - ../../olib:/app/olib
    depends_on:
      chief-backend:
        condition: service_started
      chief-redis:
        condition: service_started
  # Celery beat: schedules periodic dispatch + monitor sweeps.
  chief-beat:
    image: chief-backend-dev:latest
    build:
      context: ../..
      dockerfile: backend/Dockerfile.dev
    develop:
      watch:
        - path: ../../pyproject.toml
          action: rebuild
        - path: ../../uv.lock
          action: rebuild
        - path: ../../backend/pyproject.toml
          action: rebuild
        - path: ../../backend/Dockerfile.dev
          action: rebuild
    environment:
      - ENTRYPOINT=celery-beat
    env_file:
      - ../../.output/env.compose.backend
      - path: ../../.env.local
        required: false
    volumes:
      - ../../backend:/app
      - ../../olib:/app/olib
    depends_on:
      chief-redis:
        condition: service_started
volumes:
  postgres_data:
    name: ${DOCO_PG_VOLUME:-chief_postgres_data}
  chief_static_data:
    name: ${DOCO_STATIC_VOLUME:-chief_static_data}
