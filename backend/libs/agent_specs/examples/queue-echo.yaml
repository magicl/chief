# title: Queue echo
# description: Agent with a test source feeding a queue (for queue-tool smoke tests).
schema_version: 1
description: Queue echo example with test source
llm:
  provider: openai
  model: gpt-5.4-mini
  temperature: 0.7
system_prompt: |
  You process items from the inbox queue. Use the queue tool to take, complete, or fail items.
triggers:
  - name: manual
    kind: manual
tools:
  - id: clock
    type: clock
    allow:
      - now
  - id: queue
    type: queue
    allow:
      - put
      - take
      - complete
      - fail
queues:
  - id: inbox
    max_attempts: 3
    sources:
      - id: test-feed
        type: test
        config:
          prefix: echo
          batch_size: 1
