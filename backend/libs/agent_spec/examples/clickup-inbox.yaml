# title: ClickUp inbox
# description: Illustrative ClickUp INBOX router with gated tool and list source.
schema_version: 3
description: Illustrative ClickUp INBOX router
llm:
  provider: anthropic
  model: claude-sonnet-4-6
system_prompt: |
  Route items to the ClickUp INBOX list using the clickup tool.
integrations:
  - id: clickup
    type: clickup
    credential_ref: clickup
    config:
      team_id: "9000000"
tools:
  - id: clickup
    integration: clickup
    allow: [list_spaces, list_lists, list_tasks, get_task, create_task, update_task, create_comment]
    deny: [delete_task]
queues:
  - id: clickup-inbox
    sources:
      - id: clickup-list
        integration: clickup
        config:
          list_id: "901000000"
          statuses: [open]
          max_results: 50
triggers:
  - name: worker
    kind: queue
    queue: clickup-inbox
    prompt: Process this task.
    max_sessions: 2
  - name: manual
    kind: manual
